<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100" width="100%" height="100%">
  <defs>
    <clipPath id="eye-opening">
      <path d="M 20 50 Q 100 50 180 50 Q 100 50 20 50 Z">
        <animate attributeName="d"
          dur="10s"
          repeatCount="indefinite"
          keyTimes="0; 0.1; 0.8; 0.9; 1"
          values="
            M 20 50 Q 100 50 180 50 Q 100 50 20 50 Z;
            M 20 50 Q 100 10 180 50 Q 100 90 20 50 Z;
            M 20 50 Q 100 10 180 50 Q 100 90 20 50 Z;
            M 20 50 Q 100 50 180 50 Q 100 50 20 50 Z;
            M 20 50 Q 100 50 180 50 Q 100 50 20 50 Z
          " />
      </path>
    </clipPath>
  </defs>

  <g clip-path="url(#eye-opening)">
    <rect x="0" y="0" width="200" height="100" fill="#f4f4f4" />

    <circle cx="100" cy="50" r="18" fill="#ff0000">
      <animate attributeName="cx"
        dur="10s"
        repeatCount="indefinite"
        keyTimes="0; 0.1; 0.2; 0.4; 0.5; 0.7; 0.8; 0.9; 1"
        values="100; 100; 135; 135; 65; 65; 100; 100; 100" />
    </circle>
    
    <circle cx="100" cy="50" r="6" fill="#1a1a1a">
      <animate attributeName="cx"
        dur="10s"
        repeatCount="indefinite"
        keyTimes="0; 0.1; 0.2; 0.4; 0.5; 0.7; 0.8; 0.9; 1"
        values="100; 100; 135; 135; 65; 65; 100; 100; 100" />
    </circle>
  </g>

  <path d="M 20 50 Q 100 50 180 50" fill="none" stroke="#222" stroke-width="4" stroke-linecap="round">
    <animate attributeName="d"
      dur="10s"
      repeatCount="indefinite"
      keyTimes="0; 0.1; 0.8; 0.9; 1"
      values="
        M 20 50 Q 100 50 180 50;
        M 20 50 Q 100 10 180 50;
        M 20 50 Q 100 10 180 50;
        M 20 50 Q 100 50 180 50;
        M 20 50 Q 100 50 180 50
      " />
  </path>
  
  <path d="M 20 50 Q 100 50 180 50" fill="none" stroke="#222" stroke-width="4" stroke-linecap="round">
    <animate attributeName="d"
      dur="10s"
      repeatCount="indefinite"
      keyTimes="0; 0.1; 0.8; 0.9; 1"
      values="
        M 20 50 Q 100 50 180 50;
        M 20 50 Q 100 90 180 50;
        M 20 50 Q 100 90 180 50;
        M 20 50 Q 100 50 180 50;
        M 20 50 Q 100 50 180 50
      " />
  </path>
</svg>